# Copier interview for stellars-jupyterhub-ds deployment overlays.
#
# Generates a thin overlay directory that consumes upstream stellars-jupyterhub-ds
# as a single compose.yml downloaded from raw.githubusercontent.com and the
# stellars/duoptimum-hub:latest image pulled from Docker Hub. The overlay carries:
#   - compose_override.yml (Traefik wiring + branding env vars)
#   - branding/ (logo / favicon / icon assets)
#   - certs/ (self-signed cert scripts, optional)
#   - env.default / .env (operator settings)
#   - start.sh / stop.sh
#
# Upstream compose is downloaded on first start.sh and refreshed via
# `start.sh --refresh`; no full git clone of the upstream repo is involved.
#
# Run:
#   pip install copier
#   copier copy gh:stellarshenson/copier-stellars-jupyterhub-ds ./my-jupyterhub

_subdirectory: template
_min_copier_version: "9.0"
_exclude:
  # Always-excluded copier scaffolding
  - "copier.yml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".ipynb_checkpoints"
  - "**/.ipynb_checkpoints"
# Files rendered on first copy but never overwritten on `copier update` -
# operators are expected to customise these locally.
_skip_if_exists:
  - ".env"
  - "branding/*"
_tasks:
  - "chmod +x start.sh stop.sh"
  - "chmod +x certs/certs_generate.sh certs/certs_install.sh"
  # Eager cert generation on initial `copier copy` only. On `copier update`
  # copier renders into temp dirs to compute a 3-way diff; any cert
  # generated there ends up in the diff and would propose overwriting the
  # destination cert with a freshly-keyed one. The `when:` condition is
  # rendered with `_copier_operation` ('copy' or 'update') as a Jinja var.
  - command: "[ -f certs/certs.yml ] || (cd certs && bash certs_generate.sh)"
    when: "{{ _copier_operation == 'copy' }}"
  # Branding cleanup: drop a template default when the operator has supplied
  # a replacement. Per-asset (jh_logo / jl_logo / favicon) we recognise two
  # replacement shapes:
  #   (a) prefix-named, same base, different extension - e.g. operator
  #       dropped <prefix>_jh_logo.svg in place of <prefix>_jh_logo.png
  #   (b) non-prefix file with the same extension as the default - e.g.
  #       operator dropped acme_logo.png in place of <prefix>_jh_logo.png
  # _skip_if_exists handles the same-name same-extension case (operator
  # overwrote the file's content but kept the rendered name).
  - |
    cd branding
    for spec in 'jh_logo:png' 'jl_logo:svg' 'favicon:ico'; do
        asset=${spec%%:*}
        defext=${spec#*:}
        default="{{ branding_prefix }}_${asset}.${defext}"
        [ -f "$default" ] || continue
        prefix_other=$(find . -maxdepth 1 -type f -iname "{{ branding_prefix }}_${asset}.*" ! -name "$default" 2>/dev/null | head -1)
        non_prefix=$(find . -maxdepth 1 -type f -iname "*.${defext}" ! -name '{{ branding_prefix }}_*' 2>/dev/null | head -1)
        if [ -n "$prefix_other" ] || [ -n "$non_prefix" ]; then
            rm -f "$default"
            echo "Operator-provided ${asset} detected; removed template default $default"
        fi
    done
  # Fetch the docker-volume-toolkit helper into tools/ from GitHub. Operator-side
  # tool (prefix-to-prefix Docker volume copy - e.g. a COMPOSE_PROJECT_NAME rename
  # or a platform volume-name change). Pulled fresh each render so the deployment
  # gets the latest; non-fatal when offline. Tracked as a submodule under extra/ in
  # the template repo, but downloaded here so it is independent of the template tag.
  - |
    mkdir -p tools
    _dvm_tmp=$(mktemp -d)
    if curl -fsSL https://github.com/stellarshenson/docker-volume-toolkit/archive/refs/heads/main.tar.gz | tar -xz -C "$_dvm_tmp" 2>/dev/null; then
        rm -rf tools/docker-volume-toolkit
        mv "$_dvm_tmp"/docker-volume-toolkit-* tools/docker-volume-toolkit
        chmod +x tools/docker-volume-toolkit/migrate_volumes.py 2>/dev/null || true
        echo "Fetched docker-volume-toolkit into tools/docker-volume-toolkit"
    else
        echo "NOTE: could not download docker-volume-toolkit (offline?); tools/ left as-is" >&2
    fi
    rm -rf "$_dvm_tmp"
_message_after_copy: |2

    ╔══════════════════════════════════════════════════════════════════╗
    ║  {{ project_name }} - deployment scaffolded
    ╚══════════════════════════════════════════════════════════════════╝

    ┌─ Identity
    │  Project name           {{ project_name }}
    │  Project slug           {{ project_slug }}
    │  Branding prefix        {{ branding_prefix }}
    ├─ Access
    │  URL                    https://{% set subs = jupyterhub_subdomain.split(',') | map('trim') | map('lower') | select | unique | list %}{% set port_sfx = ':' ~ traefik_https_port if traefik_https_port != 443 else '' %}{% if subs %}{{ subs[0] }}.{% endif %}{{ base_hostname }}{{ port_sfx }}/
    │  HTTPS port             {{ traefik_https_port }}{% if traefik_https_port != 443 %}  (non-default; 443 is standard){% endif %}
    │  HTTP redirect          {{ 'enabled (:80 -> HTTPS)' if http_redirect else 'disabled (HTTPS only)' }}
    │  Admin username         {{ admin_username }}
    │  Self-registration      {{ 'enabled' if signup_enabled else 'disabled (admin bootstrap window opens on fresh DB)' }}
    ├─ Networking
    │  Addressing             {{ network_addressing }}{% if network_addressing == 'ip' %}  (subdomain URLs not supported for IPs - see note below){% endif %}
    │  Base hostname          {{ base_hostname }}
    │  Subdomain              {{ subs | join(', ') if subs else '(root domain)' }}{% if subs | length > 1 %}  (first is primary){% endif %}
    ├─ TLS  (self-signed; bundled local reverse proxy)
    │  Cert CN                {{ cert_common_name }}
    │  Cert DNS altnames      {{ cert_dns_altnames }}
    ├─ Hub features
    │  Timezone               {{ timezone or 'UTC' }}
    │  Idle culler            {{ 'enabled (max +48h extension)' if idle_culler_enabled else 'disabled' }}
    │  CIFS shared mount      {{ 'enabled (toggle via ENABLE_CIFS=1 in .env)' if cifs_shared_mount else 'disabled' }}
    ├─ Built-in defaults  (not asked for; edit compose_override.yml to change)
    │  Notebook image         stellars/stellars-jupyterlab-ds:latest
    │  Hub URL prefix         /  (root path)
    │  Upstream tracking      compose.yml downloaded from raw.githubusercontent.com (refresh via start.sh --refresh)
    │  Toolbar capitalize     enabled  (system name shown in caps)
    │  Idle culler max ext    48 hours
    └─

    Self-signed TLS cert was generated into certs/ as part of the render.
    Edit certs/certs.params + re-run certs/certs_generate.sh to regenerate.

    Next steps:
      cd {{ _copier_conf.dst_path }}
      ./start.sh

    Then open https://{% if subs %}{{ subs[0] }}.{% endif %}{{ base_hostname }}{{ port_sfx }}/
    and complete the admin bootstrap (sign up as '{{ admin_username }}').
    {%- if network_addressing == 'ip' %}

    Note: subdomain URLs (https://X.{{ base_hostname }}/) won't work because IP
    addresses don't have DNS subdomains. Use https://{{ base_hostname }}/ to reach
    the platform. Local subdomain access still works on the host machine via
    https://{% if subs %}{{ subs[0] }}.{% endif %}localhost{{ port_sfx }}/ since the localhost-side names are included in the cert SANs.
    {%- endif %}

# ── Identity ─────────────────────────────────────────────────────────────────
project_name:
  type: str
  help: "Display name for this deployment (e.g. 'ACME AI Lab')."
  default: "My JupyterHub"

project_slug:
  type: str
  help: "Short URL-friendly identifier for this deployment (used as the directory name and to namespace docker resources). Allowed characters: lowercase letters, digits, underscore, hyphen."
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z0-9_-]+$')) %}
    Project slug must contain only lowercase letters, digits, underscores, and hyphens.
    {% endif %}

branding_prefix:
  type: str
  help: "Filename prefix for branding assets (drives <prefix>_jh_logo.png, <prefix>_jl_logo.svg, <prefix>_favicon.ico). Defaults to the project slug with hyphens converted to underscores."
  default: "{{ project_slug | replace('-', '_') }}"
  validator: >-
    {% if not (branding_prefix | regex_search('^[a-z0-9_]+$')) %}
    Branding prefix must contain only lowercase letters, digits, and underscores (no hyphens - filenames use _ as separator).
    {% endif %}

# ── Networking ───────────────────────────────────────────────────────────────
network_addressing:
  type: str
  help: "How is this deployment reached on the network?"
  choices:
    "DNS hostname (subdomain routing works - e.g. jupyterhub.lab.example.com)": dns
    "Bare IP address (no subdomain support - reach via https://<ip>/ only)": ip
  default: dns

base_hostname:
  type: str
  help: |-
    {% if network_addressing == 'dns' -%}
    DNS name to reach this deployment. Examples: 'localhost', 'lab.example.com', 'my-host.local'.
    {%- else -%}
    IP address (subdomain routing is NOT possible with an IP - the deployment will be reachable at https://<this-ip>/ only; localhost subdomain access still works on the host).
    {%- endif %}
  default: "{% if network_addressing == 'dns' %}localhost{% else %}192.168.1.50{% endif %}"
  validator: >-
    {% if network_addressing == 'ip' and not (base_hostname | regex_search('^\d{1,3}(\.\d{1,3}){3}$')) %}
    With network_addressing=ip, base_hostname must be an IPv4 address (matching ^\d{1,3}(\.\d{1,3}){3}$).
    {% endif %}

jupyterhub_subdomain:
  type: str
  help: |-
    {% if network_addressing == 'dns' -%}
    Subdomain or comma-separated list (e.g. `hub` or `hub, jupyterhub`). Each is routed and added to the cert. First is primary. Case/spaces normalized. Empty = root host.
    {%- else -%}
    Localhost-only subdomain(s) for the host machine (e.g. `hub` -> https://hub.localhost/). One or comma-separated list. The IP stays the root URL. First is primary. Empty = skip.
    {%- endif %}
  default: hub

traefik_https_port:
  type: int
  help: "Host port for HTTPS (container stays 443). 443 standard; 8443 common when 443 is taken."
  default: 443
  validator: >-
    {% if traefik_https_port < 1 or traefik_https_port > 65535 %}
    Port must be between 1 and 65535.
    {% endif %}

http_redirect:
  type: bool
  help: "Publish port 80 and redirect it to HTTPS (80 is fixed). Disable if 80 is taken or you want HTTPS only."
  default: true

# ── TLS ──────────────────────────────────────────────────────────────────────
cert_common_name:
  type: str
  help: "Certificate common name."
  default: "{{ project_name | upper }} Certificate"

cert_dns_altnames:
  type: str
  help: "Cert SANs (comma-separated). Default enumerates the configured access URL, the Traefik dashboard subdomain, and the localhost-side equivalents so the host machine can reach the deployment. Edit to add or remove names."
  default: "{% set subs = jupyterhub_subdomain.split(',') | map('trim') | map('lower') | select | unique | list %}{% set sub_local = subs | map('regex_replace', '$', '.localhost') | list %}{% if network_addressing == 'ip' %}{{ ([base_hostname] + sub_local + ['localhost', 'traefik.localhost']) | unique | join(',') }}{% elif base_hostname == 'localhost' %}{{ (sub_local + ['localhost', 'traefik.localhost']) | unique | join(',') }}{% else %}{% set sub_base = subs | map('regex_replace', '$', '.' ~ base_hostname) | list %}{{ (sub_base + [base_hostname, 'traefik.' ~ base_hostname] + sub_local + ['localhost', 'traefik.localhost']) | unique | join(',') }}{% endif %}"

# ── Authentication ───────────────────────────────────────────────────────────
admin_username:
  type: str
  help: "Initial admin username (JUPYTERHUB_ADMIN). On a fresh DB, signup is silently re-opened scoped to this name only."
  default: "admin"

signup_enabled:
  type: bool
  help: "Operator self-registration. Bootstrap window for the admin still opens on a fresh DB regardless."
  default: false

# ── Hub features ─────────────────────────────────────────────────────────────
timezone:
  type: str
  help: "IANA timezone applied to hub and spawned containers (blank = UTC)."
  default: "Europe/Warsaw"

idle_culler_enabled:
  type: bool
  help: "Idle server culler enabled."
  default: true

cifs_shared_mount:
  type: bool
  help: "Ship CIFS overlay (compose_cifs.yml + ENABLE_CIFS toggle in env.default)."
  default: false

